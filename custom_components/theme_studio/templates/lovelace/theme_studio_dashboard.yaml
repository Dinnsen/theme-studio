                              [[[
                                const enabled = states['input_boolean.theme_studio_theme_use_custom_background_color']?.state === 'on';
                                const v = states['input_text.theme_studio_theme_custom_background_color']?.state;
                                const base = states['input_text.theme_studio_theme_base_color']?.state;
                                return (enabled && v) ? v : ((base && base !== 'auto') ? base : 'var(--background-color)');
                              ]]]
                          - '--btn-text': |
                              [[[
                                const enabled = states['input_boolean.theme_studio_theme_use_custom_background_color']?.state === 'on';
                                const v = states['input_text.theme_studio_theme_custom_background_color']?.state;
                                if (!(enabled && v)) return 'var(--primary-text-color)';
                                let hex = v.replace('#','');
