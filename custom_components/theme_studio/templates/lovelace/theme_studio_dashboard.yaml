                        target:
                          entity_id: input_text.theme_studio_theme_base_color
                        data:
                          value: auto
                      styles:
                        card:
                          - '--btn-bg': |
                              [[[
                                const v = states['input_text.theme_studio_theme_base_color'].state;
                                return (v && v !== 'auto') ? v : '#344334';
                              ]]]
                          - '--btn-text': |
                              [[[
                                const bg = (() => {
                                  const v = states['input_text.theme_studio_theme_base_color'].state;
                                  return (v && v !== 'auto') ? v : '#344334';
                                })();
                                let hex = bg.replace('#','');
                                if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
                                const r = parseInt(hex.substring(0,2), 16);
                                const g = parseInt(hex.substring(2,4), 16);
                                const b = parseInt(hex.substring(4,6), 16);
                                const lum = 0.2126*r + 0.7152*g + 0.0722*b;
                                return lum > 150 ? '#111111' : '#ffffff';
                              ]]]
                          - '--btn-label': |
                              [[[
                                const bg = (() => {
                                  const v = states['input_text.theme_studio_theme_base_color'].state;
