decluttering_templates:
  navbar_theme_studio:
    default:
      - routes: []
    card:
      type: custom:navbar-card
      routes: '[[routes]]'
      styles: |-
        :host {
          --navbar-bg-resolved: var(--theme-studio-navbar-background-color, var(--ha-card-background));
          --navbar-icon-resolved: var(--theme-studio-navbar-primary-color, var(--state-icon-color));
          --navbar-text-resolved: var(--theme-studio-navbar-text-color, var(--primary-text-color));
          --navbar-active-icon-resolved: var(--theme-studio-navbar-active-color, var(--state-icon-active-color));
          --navbar-active-text-resolved: var(--theme-studio-navbar-active-text-color, var(--primary-text-color));
        }

        ha-card {
          background: var(--navbar-bg-resolved) !important;
          background-color: var(--navbar-bg-resolved) !important;
        }

        .navbar-card {
          background: var(--navbar-bg-resolved) !important;
          background-color: var(--navbar-bg-resolved) !important;
          --icon-primary-color: var(--navbar-icon-resolved);
          color: var(--navbar-text-resolved);
        }

        .route {
          --icon-primary-color: var(--navbar-icon-resolved);
          color: var(--navbar-text-resolved);
        }

        .route .label {
          color: var(--navbar-text-resolved);
        }

        .route.active,
        .route.current,
        .route[selected] {
          --icon-primary-color: var(--navbar-active-icon-resolved);
          color: var(--navbar-active-text-resolved);
        }

        .route.active .label,
        .route.current .label,
        .route[selected] .label {
          color: var(--navbar-active-text-resolved);
        }

        .popup,
        .popup-content {
          background: var(--navbar-bg-resolved) !important;
          background-color: var(--navbar-bg-resolved) !important;
        }

        .popup-route,
        .popup-item {
          --icon-primary-color: var(--navbar-icon-resolved) !important;
          color: var(--navbar-text-resolved);
        }

        .popup-route .label,
        .popup-item .label {
          color: var(--navbar-text-resolved);
        }

        .popup-route.active,
        .popup-route.current,
        .popup-route[selected],
        .popup-item.active,
        .popup-item.current,
        .popup-item[selected] {
          --icon-primary-color: var(--navbar-active-icon-resolved) !important;
          color: var(--navbar-active-text-resolved);
        }

        .popup-route.active .label,
        .popup-route.current .label,
        .popup-route[selected] .label,
        .popup-item.active .label,
        .popup-item.current .label,
        .popup-item[selected] .label {
          color: var(--navbar-active-text-resolved);
        }
button_card_templates:
  theme_studio_overlay_palette_templates:
    show_name: false
    show_icon: false
    show_state: false
    styles:
      card:
        - display: none
    custom_fields:
      init: |
        [[[
          window.themeStudioOverlayPreviewPalette = () => {
            const boolOn = (state) => ['1','true','on','yes'].includes(String(state || '').toLowerCase());

            const base = states['input_text.theme_studio_theme_base_color']?.state || '#344334';
            const customBgEnabled = boolOn(states['input_boolean.theme_studio_theme_use_custom_background_color']?.state);
            const customBg = states['input_text.theme_studio_theme_custom_background_color']?.state || base;
            const bg = customBgEnabled ? customBg : base;

            const normalizeHex = (value) => {
              const hex = String(value || '#344334').replace('#', '');
              return hex.length === 3 ? hex.split('').map(c => c + c).join('') : hex.padEnd(6, '0').slice(0, 6);
            };

            const full = normalizeHex(bg);
            const r = parseInt(full.substring(0, 2), 16);
            const g = parseInt(full.substring(2, 4), 16);
            const b = parseInt(full.substring(4, 6), 16);
            const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            const lightBg = lum > 150;

            const strength = Math.max(0, Math.min(1, Number(states['input_number.theme_studio_theme_background_overlay_strength']?.state || 55) / 100));
            const spread = Math.max(0.5, Math.min(2, Number(states['input_number.theme_studio_theme_overlay_spread']?.state || 100) / 100));
            const scale = Math.max(0.5, Math.min(2, Number(states['input_number.theme_studio_theme_overlay_scale']?.state || 100) / 100));

            let darkBoost = 1.0;
            if (lum <= 26) darkBoost = 1.45;
            else if (lum <= 50) darkBoost = 1.18;

            const ink = lightBg ? '0,0,0' : '255,255,255';

            const cap = (value, max = 1) => Math.max(0, Math.min(max, value));
            const pow = (v, p) => Math.pow(Math.max(0, Math.min(1, v)), p);
            const rgba = (alpha) => `rgba(${ink},${cap(alpha).toFixed(2)})`;
            const alpha = (baseAlpha, power = 1.0, boostDark = true, max = 1) => {
              let out = baseAlpha * pow(strength, power);
              if (!lightBg && boostDark) out *= darkBoost;
              return cap(out, max);
            };

            return {
              bg,
              lum,
              lightBg,
              strength,
              spread,
              scale,
              darkBoost,
              ink,
              cap,
              rgba,
              alpha
            };
          };
          return '';
        ]]]
  theme_studio_overlay_tile:
    show_icon: false
    show_state: false
    show_label: false
    name: ''
    variables:
      overlay_key: none
      overlay_bg: none
    styles:
      card:
        - height: 86px
        - background: |
            [[[ return variables.overlay_bg; ]]]
        - box-shadow: |
            [[[
              return states['input_select.theme_studio_theme_background_overlay']?.state === variables.overlay_key
                ? 'var(--d1-overlay-tile-shadow-active)'
                : 'var(--d1-overlay-tile-shadow)';
            ]]]
      name:
        - color: |
            [[[
              const resolveCssVar = (value) => {
                let v = String(value || '').trim();
                for (let i = 0; i < 5 && v.startsWith('var('); i++) {
                  const m = v.match(/var\((--[^),\s]+)(?:,\s*([^)]+))?\)/);
                  if (!m) break;
                  const css = getComputedStyle(document.documentElement).getPropertyValue(m[1]).trim();
                  v = css || (m[2] ? m[2].trim() : '');
                }
                return v;
              };

              const parseColor = (value) => {
                const v = resolveCssVar(value);
                if (!v) return null;

                if (v.startsWith('#')) {
                  let hex = v.slice(1);
                  if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
                  return {
                    r: parseInt(hex.slice(0,2),16),
                    g: parseInt(hex.slice(2,4),16),
                    b: parseInt(hex.slice(4,6),16)
                  };
                }

                const rgb = v.match(/rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)/i);
                if (rgb) {
                  return {
                    r: parseFloat(rgb[1]),
                    g: parseFloat(rgb[2]),
                    b: parseFloat(rgb[3])
                  };
                }

                return null;
              };

              const rgb = parseColor(variables.overlay_bg);
              if (!rgb) return 'var(--primary-text-color)';

              const lum = 0.2126*rgb.r + 0.7152*rgb.g + 0.0722*rgb.b;

              return lum > 150 ? '#111111' : '#ffffff';
            ]]]
        - font-size: 12px
        - font-weight: 700
  ts_border_preview:
    show_icon: false
    show_name: true
    tap_action:
      action: call-service
      service: input_select.select_option
      target:
        entity_id: input_select.theme_studio_theme_border_type
      data:
        option: '[[[ return variables.ts_type; ]]]'
    name: '[[[ return variables.ts_label; ]]]'
    styles:
      card:
        - height: 104px
        - margin: 0px 18px 18px 0px
        - border-radius: 18px
        - background: |
            [[[
              const active = states['input_select.theme_studio_theme_border_type']?.state === variables.ts_type;
              return active
                ? 'color-mix(in srgb, var(--accent-color) 22%, var(--ha-card-background))'
                : 'var(--ha-card-background)';
            ]]]
        - border: |
            [[[
              const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
              const wrapH = (h) => ((h % 360) + 360) % 360;
              const safeNum = (id, fallback = 0) => {
                const raw = states[id]?.state;
                const n = Number(raw);
                return Number.isFinite(n) ? n : fallback;
              };
              const rgbToHsl = (r, g, b) => {
                r /= 255; g /= 255; b /= 255;
                const max = Math.max(r, g, b), min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;
                if (max === min) {
                  h = s = 0;
                } else {
                  const d = max - min;
                  s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                  switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    default: h = (r - g) / d + 4; break;
                  }
                  h /= 6;
                }
                return { h: h * 360, s: s * 100, l: l * 100 };
              };
              const parseColor = (input) => {
                const v = String(input || '').trim();
                if (!v) return null;
                if (v.startsWith('#')) {
                  let hex = v.slice(1);
                  if (hex.length === 3) hex = hex.split('').map(x => x + x).join('');
                  if (hex.length !== 6) return null;
                  const r = parseInt(hex.slice(0, 2), 16);
                  const g = parseInt(hex.slice(2, 4), 16);
                  const b = parseInt(hex.slice(4, 6), 16);
                  return rgbToHsl(r, g, b);
                }
                let m = v.match(/hsla?\(([-\d.]+),\s*([-\d.]+)%?,\s*([-\d.]+)%?/i);
                if (m) return { h: Number(m[1]), s: Number(m[2]), l: Number(m[3]) };
                m = v.match(/rgba?\(([-\d.]+),\s*([-\d.]+),\s*([-\d.]+)/i);
                if (m) return rgbToHsl(Number(m[1]), Number(m[2]), Number(m[3]));
                return null;
              };
              const hsla = (h, s, l, a) => `hsla(${Math.round(wrapH(h))}, ${Math.round(clamp(s,0,100))}%, ${Math.round(clamp(l,0,100))}%, ${clamp(a,0,1).toFixed(2)})`;

              const buildFx = (forcedBorder) => {
                const root = getComputedStyle(document.documentElement);
                const surface = parseColor(root.getPropertyValue('--ha-card-background')) || { h: 140, s: 8, l: 18 };
                const backdrop = parseColor(root.getPropertyValue('--background-color')) || surface;

                const border_contrast = clamp(safeNum('input_number.theme_studio_theme_border_contrast', 0), -100, 100);
                const border_hue_shift = safeNum('input_number.theme_studio_theme_border_hue_shift', 0);
                const border_saturation = clamp(safeNum('input_number.theme_studio_theme_border_saturation', 0), -50, 50);
                const border_opacity = clamp(safeNum('input_number.theme_studio_theme_border_opacity', 28), 0, 100);
                const border_size = clamp(safeNum('input_number.theme_studio_theme_border_size', 4), 0, 12);

                const surface_h = surface.h;
                const surface_s = surface.s;
                const surface_l = surface.l;
                const backdrop_l = backdrop.l;

                const border_sat_base = Math.max(surface_s * 0.45 + 18, 18);
                const border_sat_scale = 1.0 + (border_saturation / 50.0) * 0.90;
                const border_s = clamp(border_sat_base * border_sat_scale + border_saturation * 0.35, 0, 100);

                const border_contrast_n = border_contrast / 100.0;
                const border_h = wrapH(surface_h + border_hue_shift);
                const border_light_dir_base = surface_l < 54 ? 18 : -16;
                const border_light_dir = border_light_dir_base * (1.0 + border_contrast_n * 0.65);
                let border_backdrop_bias = backdrop_l >= 58 ? -8 : backdrop_l <= 32 ? 10 : 0;
                border_backdrop_bias = border_backdrop_bias * (1.0 + border_contrast_n * 0.35);
                const border_l = clamp(surface_l + border_light_dir + border_backdrop_bias + border_contrast * 0.12, 0, 100);
                const border_a = clamp(border_opacity / 100, 0, 1);

                const bsz = clamp(border_size, 0, 12);
                const size_n = bsz / 12;
                const border_px = Math.max(1, Math.round(1 + bsz * 0.34));
                const border_px_soft = Math.max(1, Math.round(1 + bsz * 0.18));
                const border_px_hair = Math.max(1, Math.round(1 + bsz * 0.10));
                const accent_px = Math.max(2, Math.round(2 + bsz * 0.24));

                const border_visibility_boost = clamp(1.0 + border_contrast_n * 0.55, 0.35, 1.55);
                const base_alpha = clamp(border_a * border_visibility_boost, 0, 1);

                const line = hsla(border_h, border_s, border_l, base_alpha);
                const line_soft = hsla(border_h, clamp(border_s * 0.70, 0, 100), clamp(border_l + 4, 0, 100), clamp(base_alpha * 0.72, 0, 1));
                const line_hair = hsla(border_h, clamp(border_s * 0.56, 0, 100), clamp(border_l + 8, 0, 100), clamp(base_alpha * 0.52, 0, 1));
                const line_inner = hsla(border_h, clamp(border_s * 0.82 + 4, 0, 100), clamp(border_l + 16, 0, 100), clamp(base_alpha * 0.70, 0, 1));
                const line_shadow = hsla(border_h, clamp(border_s * 0.76, 0, 100), clamp(border_l - 22, 0, 100), clamp(base_alpha * 0.42, 0, 1));
                const accent_line = hsla(border_h, clamp(border_s + 18, 0, 100), clamp(border_l + 6, 0, 100), clamp(base_alpha * 1.06, 0, 1));
                const accent_glow = hsla(border_h, clamp(border_s + 24, 0, 100), clamp(border_l + 10, 0, 100), clamp(base_alpha * 0.40, 0, 1));
                const glow_line = hsla(border_h, clamp(border_s + 10, 0, 100), clamp(border_l + 10, 0, 100), clamp(base_alpha * 0.30, 0, 1));
                const inner_glow = hsla(border_h, clamp(border_s + 16, 0, 100), clamp(border_l + 16, 0, 100), clamp(base_alpha * 0.44, 0, 1));

                let border_css = 'none';
                let border_effect_css = 'none';

                if (forcedBorder === 'soft_hairline') {
                  border_css = `${border_px_hair}px solid ${line_hair}`;
                  border_effect_css = `0 0 0 ${border_px_hair}px ${line_hair}`;
                } else if (forcedBorder === 'glass_edge') {
                  border_effect_css = `inset 0 1px 0 ${line_inner}, inset 1px 0 0 ${hsla(border_h, clamp(border_s * 0.60, 0, 100), clamp(border_l + 8, 0, 100), clamp(base_alpha * 0.30, 0, 1))}, inset 0 -1px 0 ${line_shadow}, 0 0 0 1px ${hsla(border_h, clamp(border_s * 0.55, 0, 100), clamp(border_l + 2, 0, 100), clamp(base_alpha * 0.16, 0, 1))}`;
                } else if (forcedBorder === 'etched') {
                  const bevel_px = Math.max(1, Math.round(1 + bsz * 0.18));
                  border_effect_css = `inset 0 ${bevel_px}px 0 ${line_inner}, inset 0 -${bevel_px}px 0 ${line_shadow}`;
                } else if (forcedBorder === 'inner_glow') {
                  border_effect_css = `inset 0 0 ${Math.round(8 + 26 * size_n)}px ${inner_glow}, inset 0 0 ${Math.round(2 + 10 * size_n)}px ${hsla(border_h, clamp(border_s + 8, 0, 100), clamp(border_l + 20, 0, 100), clamp(base_alpha * 0.54, 0, 1))}`;
                } else if (forcedBorder === 'accent_line') {
                  border_css = `${accent_px}px solid ${accent_line}`;
                  border_effect_css = `0 0 0 ${accent_px}px ${accent_line}, 0 0 ${Math.round(8 + 30 * size_n)}px ${accent_glow}`;
                } else if (forcedBorder === 'double_line') {
                  const outer_px = Math.max(1, Math.round(1 + bsz * 0.22));
                  const inner_px = Math.max(2, Math.round(2 + bsz * 0.32));
                  border_css = `${outer_px}px solid ${line}`;
                  border_effect_css = `0 0 0 ${outer_px}px ${line}, inset 0 0 0 ${inner_px}px ${hsla(border_h, clamp(border_s + 6, 0, 100), clamp(border_l + 10, 0, 100), clamp(base_alpha * 0.52, 0, 1))}`;
                } else if (forcedBorder === 'bevel_edge') {
                  const bevel_px = Math.max(1, Math.round(1 + bsz * 0.24));
                  border_effect_css = `inset 0 ${bevel_px}px 0 ${line_inner}, inset ${bevel_px}px 0 0 ${line_inner}, inset 0 -${bevel_px}px 0 ${line_shadow}, inset -${bevel_px}px 0 0 ${line_shadow}`;
                } else if (forcedBorder === 'glow_line') {
                  border_css = `${border_px_soft}px solid ${line_soft}`;
                  border_effect_css = `0 0 ${Math.round(10 + 34 * size_n)}px ${glow_line}, inset 0 0 ${Math.round(8 + 26 * size_n)}px ${inner_glow}, inset 0 0 ${Math.round(2 + 10 * size_n)}px ${hsla(border_h, clamp(border_s + 8, 0, 100), clamp(border_l + 20, 0, 100), clamp(base_alpha * 0.54, 0, 1))}`;
                }

                return { border_css, border_effect_css };
              };

              return buildFx(variables.ts_type).border_css;
            ]]]
        - box-shadow: |
            [[[
              const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
              const wrapH = (h) => ((h % 360) + 360) % 360;
              const safeNum = (id, fallback = 0) => {
                const raw = states[id]?.state;
                const n = Number(raw);
                return Number.isFinite(n) ? n : fallback;
              };
              const rgbToHsl = (r, g, b) => {
                r /= 255; g /= 255; b /= 255;
                const max = Math.max(r, g, b), min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;
                if (max === min) {
                  h = s = 0;
                } else {
                  const d = max - min;
                  s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                  switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    default: h = (r - g) / d + 4; break;
                  }
                  h /= 6;
                }
                return { h: h * 360, s: s * 100, l: l * 100 };
              };
              const parseColor = (input) => {
                const v = String(input || '').trim();
                if (!v) return null;
                if (v.startsWith('#')) {
                  let hex = v.slice(1);
                  if (hex.length === 3) hex = hex.split('').map(x => x + x).join('');
                  if (hex.length !== 6) return null;
                  const r = parseInt(hex.slice(0, 2), 16);
                  const g = parseInt(hex.slice(2, 4), 16);
                  const b = parseInt(hex.slice(4, 6), 16);
                  return rgbToHsl(r, g, b);
                }
                let m = v.match(/hsla?\(([-\d.]+),\s*([-\d.]+)%?,\s*([-\d.]+)%?/i);
                if (m) return { h: Number(m[1]), s: Number(m[2]), l: Number(m[3]) };
                m = v.match(/rgba?\(([-\d.]+),\s*([-\d.]+),\s*([-\d.]+)/i);
                if (m) return rgbToHsl(Number(m[1]), Number(m[2]), Number(m[3]));
                return null;
              };
              const hsla = (h, s, l, a) => `hsla(${Math.round(wrapH(h))}, ${Math.round(clamp(s,0,100))}%, ${Math.round(clamp(l,0,100))}%, ${clamp(a,0,1).toFixed(2)})`;

              const buildFx = (forcedBorder) => {
                const root = getComputedStyle(document.documentElement);
                const surface = parseColor(root.getPropertyValue('--ha-card-background')) || { h: 140, s: 8, l: 18 };
                const backdrop = parseColor(root.getPropertyValue('--background-color')) || surface;

                const border_contrast = clamp(safeNum('input_number.theme_studio_theme_border_contrast', 0), -100, 100);
                const border_hue_shift = safeNum('input_number.theme_studio_theme_border_hue_shift', 0);
                const border_saturation = clamp(safeNum('input_number.theme_studio_theme_border_saturation', 0), -50, 50);
                const border_opacity = clamp(safeNum('input_number.theme_studio_theme_border_opacity', 28), 0, 100);
                const border_size = clamp(safeNum('input_number.theme_studio_theme_border_size', 4), 0, 12);

                const surface_h = surface.h;
                const surface_s = surface.s;
                const surface_l = surface.l;
                const backdrop_l = backdrop.l;

                const border_sat_base = Math.max(surface_s * 0.45 + 18, 18);
                const border_sat_scale = 1.0 + (border_saturation / 50.0) * 0.90;
                const border_s = clamp(border_sat_base * border_sat_scale + border_saturation * 0.35, 0, 100);

                const border_contrast_n = border_contrast / 100.0;
                const border_h = wrapH(surface_h + border_hue_shift);
                const border_light_dir_base = surface_l < 54 ? 18 : -16;
                const border_light_dir = border_light_dir_base * (1.0 + border_contrast_n * 0.65);
                let border_backdrop_bias = backdrop_l >= 58 ? -8 : backdrop_l <= 32 ? 10 : 0;
                border_backdrop_bias = border_backdrop_bias * (1.0 + border_contrast_n * 0.35);
                const border_l = clamp(surface_l + border_light_dir + border_backdrop_bias + border_contrast * 0.12, 0, 100);
                const border_a = clamp(border_opacity / 100, 0, 1);

                const bsz = clamp(border_size, 0, 12);
                const size_n = bsz / 12;
                const border_px = Math.max(1, Math.round(1 + bsz * 0.34));
                const border_px_soft = Math.max(1, Math.round(1 + bsz * 0.18));
                const border_px_hair = Math.max(1, Math.round(1 + bsz * 0.10));
                const accent_px = Math.max(2, Math.round(2 + bsz * 0.24));

                const border_visibility_boost = clamp(1.0 + border_contrast_n * 0.55, 0.35, 1.55);
                const base_alpha = clamp(border_a * border_visibility_boost, 0, 1);

                const line = hsla(border_h, border_s, border_l, base_alpha);
                const line_soft = hsla(border_h, clamp(border_s * 0.70, 0, 100), clamp(border_l + 4, 0, 100), clamp(base_alpha * 0.72, 0, 1));
                const line_hair = hsla(border_h, clamp(border_s * 0.56, 0, 100), clamp(border_l + 8, 0, 100), clamp(base_alpha * 0.52, 0, 1));
                const line_inner = hsla(border_h, clamp(border_s * 0.82 + 4, 0, 100), clamp(border_l + 16, 0, 100), clamp(base_alpha * 0.70, 0, 1));
                const line_shadow = hsla(border_h, clamp(border_s * 0.76, 0, 100), clamp(border_l - 22, 0, 100), clamp(base_alpha * 0.42, 0, 1));
                const accent_line = hsla(border_h, clamp(border_s + 18, 0, 100), clamp(border_l + 6, 0, 100), clamp(base_alpha * 1.06, 0, 1));
                const accent_glow = hsla(border_h, clamp(border_s + 24, 0, 100), clamp(border_l + 10, 0, 100), clamp(base_alpha * 0.40, 0, 1));
                const glow_line = hsla(border_h, clamp(border_s + 10, 0, 100), clamp(border_l + 10, 0, 100), clamp(base_alpha * 0.30, 0, 1));
                const inner_glow = hsla(border_h, clamp(border_s + 16, 0, 100), clamp(border_l + 16, 0, 100), clamp(base_alpha * 0.44, 0, 1));

                let border_effect_css = 'none';

                if (forcedBorder === 'soft_hairline') {
                  border_effect_css = `0 0 0 ${border_px_hair}px ${line_hair}`;
                } else if (forcedBorder === 'glass_edge') {
                  border_effect_css = `inset 0 1px 0 ${line_inner}, inset 1px 0 0 ${hsla(border_h, clamp(border_s * 0.60, 0, 100), clamp(border_l + 8, 0, 100), clamp(base_alpha * 0.30, 0, 1))}, inset 0 -1px 0 ${line_shadow}, 0 0 0 1px ${hsla(border_h, clamp(border_s * 0.55, 0, 100), clamp(border_l + 2, 0, 100), clamp(base_alpha * 0.16, 0, 1))}`;
                } else if (forcedBorder === 'etched') {
                  const bevel_px = Math.max(1, Math.round(1 + bsz * 0.18));
                  border_effect_css = `inset 0 ${bevel_px}px 0 ${line_inner}, inset 0 -${bevel_px}px 0 ${line_shadow}`;
                } else if (forcedBorder === 'inner_glow') {
                  border_effect_css = `inset 0 0 ${Math.round(8 + 26 * size_n)}px ${inner_glow}, inset 0 0 ${Math.round(2 + 10 * size_n)}px ${hsla(border_h, clamp(border_s + 8, 0, 100), clamp(border_l + 20, 0, 100), clamp(base_alpha * 0.54, 0, 1))}`;
                } else if (forcedBorder === 'accent_line') {
                  border_effect_css = `0 0 0 ${accent_px}px ${accent_line}, 0 0 ${Math.round(8 + 30 * size_n)}px ${accent_glow}`;
                } else if (forcedBorder === 'double_line') {
                  const outer_px = Math.max(1, Math.round(1 + bsz * 0.22));
                  const inner_px = Math.max(2, Math.round(2 + bsz * 0.32));
                  border_effect_css = `0 0 0 ${outer_px}px ${line}, inset 0 0 0 ${inner_px}px ${hsla(border_h, clamp(border_s + 6, 0, 100), clamp(border_l + 10, 0, 100), clamp(base_alpha * 0.52, 0, 1))}`;
                } else if (forcedBorder === 'bevel_edge') {
                  const bevel_px = Math.max(1, Math.round(1 + bsz * 0.24));
                  border_effect_css = `inset 0 ${bevel_px}px 0 ${line_inner}, inset ${bevel_px}px 0 0 ${line_inner}, inset 0 -${bevel_px}px 0 ${line_shadow}, inset -${bevel_px}px 0 0 ${line_shadow}`;
                } else if (forcedBorder === 'glow_line') {
                  border_effect_css = `0 0 ${Math.round(10 + 34 * size_n)}px ${glow_line}, inset 0 0 ${Math.round(8 + 26 * size_n)}px ${inner_glow}, inset 0 0 ${Math.round(2 + 10 * size_n)}px ${hsla(border_h, clamp(border_s + 8, 0, 100), clamp(border_l + 20, 0, 100), clamp(base_alpha * 0.54, 0, 1))}`;
                }

                return { border_effect_css };
              };

              const fx = buildFx(variables.ts_type);
              return fx.border_effect_css && fx.border_effect_css !== 'none' ? fx.border_effect_css : 'none';
            ]]]
      name:
        - color: var(--primary-text-color)
        - font-size: 12px
        - font-weight: 700
  ts_shadow_preview:
    show_icon: false
    show_name: true
    tap_action:
      action: call-service
      service: input_select.select_option
      target:
        entity_id: input_select.theme_studio_theme_shadow_type
      data:
        option: '[[[ return variables.ts_type; ]]]'
    name: '[[[ return variables.ts_label; ]]]'
    styles:
      card:
        - height: 104px
        - margin: 0px 18px 18px 0px
        - border-radius: 18px
        - background: |
            [[[
              const active = states['input_select.theme_studio_theme_shadow_type']?.state === variables.ts_type;
              return active
                ? 'color-mix(in srgb, var(--accent-color) 22%, var(--ha-card-background))'
                : 'var(--ha-card-background)';
            ]]]
        - border: none
        - box-shadow: |
            [[[
              const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
              const wrapH = (h) => ((h % 360) + 360) % 360;
              const safeNum = (id, fallback = 0) => {
                const raw = states[id]?.state;
                const n = Number(raw);
                return Number.isFinite(n) ? n : fallback;
              };
              const rgbToHsl = (r, g, b) => {
                r /= 255; g /= 255; b /= 255;
                const max = Math.max(r, g, b), min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;
                if (max === min) {
                  h = s = 0;
                } else {
                  const d = max - min;
                  s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                  switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    default: h = (r - g) / d + 4; break;
                  }
                  h /= 6;
                }
                return { h: h * 360, s: s * 100, l: l * 100 };
              };
              const parseColor = (input) => {
                const v = String(input || '').trim();
                if (!v) return null;
                if (v.startsWith('#')) {
                  let hex = v.slice(1);
                  if (hex.length === 3) hex = hex.split('').map(x => x + x).join('');
                  if (hex.length !== 6) return null;
                  const r = parseInt(hex.slice(0, 2), 16);
                  const g = parseInt(hex.slice(2, 4), 16);
                  const b = parseInt(hex.slice(4, 6), 16);
                  return rgbToHsl(r, g, b);
                }
                let m = v.match(/hsla?\(([-\d.]+),\s*([-\d.]+)%?,\s*([-\d.]+)%?/i);
                if (m) return { h: Number(m[1]), s: Number(m[2]), l: Number(m[3]) };
                m = v.match(/rgba?\(([-\d.]+),\s*([-\d.]+),\s*([-\d.]+)/i);
                if (m) return rgbToHsl(Number(m[1]), Number(m[2]), Number(m[3]));
                return null;
              };
              const hsla = (h, s, l, a) => `hsla(${Math.round(wrapH(h))}, ${Math.round(clamp(s,0,100))}%, ${Math.round(clamp(l,0,100))}%, ${clamp(a,0,1).toFixed(2)})`;

              const buildFx = (forcedShadow) => {
                const root = getComputedStyle(document.documentElement);
                const surface = parseColor(root.getPropertyValue('--ha-card-background')) || { h: 140, s: 8, l: 18 };
                const backdrop = parseColor(root.getPropertyValue('--background-color')) || surface;

                const shadow_contrast = clamp(safeNum('input_number.theme_studio_theme_shadow_contrast', 0), -100, 100);
                const shadow_hue_shift = safeNum('input_number.theme_studio_theme_shadow_hue_shift', 0);
                const shadow_saturation = clamp(safeNum('input_number.theme_studio_theme_shadow_saturation', 0), -50, 50);
                const shadow_opacity = clamp(safeNum('input_number.theme_studio_theme_shadow_opacity', 42), 0, 100);
                const shadow_size = clamp(safeNum('input_number.theme_studio_theme_shadow_size', 40), 0, 100);

                const surface_h = surface.h;
                const surface_s = surface.s;
                const surface_l = surface.l;
                const backdrop_l = backdrop.l;

                const shadow_sat_base = Math.max(surface_s * 0.32 + 8, 8);
                const shadow_sat_scale = 1.0 + (shadow_saturation / 50.0) * 1.10;
                const shadow_s = clamp(shadow_sat_base * shadow_sat_scale + shadow_saturation * 0.40, 0, 100);

                const shadow_h = wrapH(surface_h + shadow_hue_shift);
                const shadow_a = clamp(shadow_opacity / 100, 0, 1);
                const shadow_contrast_n = shadow_contrast / 100.0;

                const ssz = clamp(shadow_size, 0, 100) / 100;
                const sep = Math.abs(surface_l - backdrop_l);
                const closeness = 1.0 - clamp(sep / 28.0, 0, 1);
                const visibility_boost = clamp(1.0 + shadow_contrast_n * 0.75 + closeness * 0.85, 0.20, 2.20);

                const light_backdrop = backdrop_l >= 58;
                const dark_backdrop = backdrop_l <= 34;

                const shadow_y_1 = Math.round(2 + 8 * ssz);
                const shadow_blur_1 = Math.round(8 + 16 * ssz);
                const shadow_y_2 = Math.round(8 + 18 * ssz);
                const shadow_blur_2 = Math.round(18 + 32 * ssz);
                const shadow_y_3 = Math.round(16 + 28 * ssz);
                const spread_2 = Math.round(0 + 4 * ssz);
                const spread_3 = Math.round(2 + 8 * ssz);

                const dark_base_l = clamp(Math.min(surface_l, backdrop_l) - 22 - shadow_contrast * 0.10, 0, 100);
                const dark_mid_l = clamp(dark_base_l - (8 + shadow_contrast_n * 3.0), 0, 100);
                const dark_far_l = clamp(dark_base_l - (16 + shadow_contrast_n * 6.0), 0, 100);
                const light_base_l = clamp(Math.max(surface_l, backdrop_l) + 18 + shadow_contrast * 0.10, 0, 100);
                const light_far_l = clamp(light_base_l + (8 + shadow_contrast_n * 4.0), 0, 100);

                const dark_shadow_1 = hsla(shadow_h, shadow_s, dark_base_l, clamp(shadow_a * 0.34 * visibility_boost, 0, 1));
                const dark_shadow_2 = hsla(shadow_h, shadow_s, dark_mid_l, clamp(shadow_a * 0.24 * visibility_boost, 0, 1));
                const dark_shadow_3 = hsla(shadow_h, shadow_s, dark_far_l, clamp(shadow_a * 0.16 * visibility_boost, 0, 1));
                const light_shadow_1 = hsla(shadow_h, clamp(shadow_s * 0.72 + 10, 0, 100), light_base_l, clamp(shadow_a * 0.22 * visibility_boost, 0, 1));
                const light_shadow_2 = hsla(shadow_h, clamp(shadow_s * 0.66 + 12, 0, 100), light_far_l, clamp(shadow_a * 0.14 * visibility_boost, 0, 1));
                const glow_color_1 = hsla(shadow_h, clamp(shadow_s + 18, 0, 100), clamp(light_base_l + 4, 0, 100), clamp(shadow_a * 0.24 * visibility_boost, 0, 1));
                const glow_color_2 = hsla(shadow_h, clamp(shadow_s + 24, 0, 100), clamp(light_far_l + 8, 0, 100), clamp(shadow_a * 0.14 * visibility_boost, 0, 1));

                let subtle_rim = 'none';
                if (dark_backdrop || closeness > 0.35) subtle_rim = `0 0 ${Math.round(8 + 18 * ssz)}px ${light_shadow_1}`;

                let shadow_css = 'none';
                if (forcedShadow === 'soft_depth') {
                  shadow_css = [ `0 ${shadow_y_1}px ${shadow_blur_1}px ${dark_shadow_1}`, `0 ${shadow_y_2}px ${shadow_blur_2}px -${spread_2}px ${dark_shadow_2}`, ...(subtle_rim === 'none' ? [] : [subtle_rim]) ].join(', ');
                } else if (forcedShadow === 'glass_glow') {
                  shadow_css = [ `0 ${shadow_y_1}px ${Math.round(10 + 14 * ssz)}px ${dark_shadow_1}`, `0 ${shadow_y_2}px ${Math.round(18 + 22 * ssz)}px -${spread_2}px ${dark_shadow_2}`, `0 0 ${Math.round(12 + 28 * ssz)}px ${glow_color_1}`, `0 0 ${Math.round(26 + 44 * ssz)}px ${glow_color_2}` ].join(', ');
                } else if (forcedShadow === 'ambient_lift') {
                  const ambient_key = light_backdrop ? dark_shadow_1 : light_shadow_1;
                  shadow_css = [ `0 1px 2px ${hsla(shadow_h, shadow_s, light_backdrop ? dark_base_l : light_base_l, clamp(shadow_a * 0.10 * visibility_boost, 0, 1))}`, `0 ${Math.round(2 + 5 * ssz)}px ${Math.round(10 + 14 * ssz)}px ${ambient_key}`, ...(subtle_rim === 'none' ? [] : [subtle_rim]) ].join(', ');
                } else if (forcedShadow === 'neon_glow') {
                  shadow_css = [ `0 0 ${Math.round(16 + 24 * ssz)}px ${hsla(shadow_h, clamp(shadow_s + 24, 0, 100), clamp(light_base_l + 8, 0, 100), clamp(shadow_a * 0.34 * visibility_boost, 0, 1))}`, `0 0 ${Math.round(34 + 48 * ssz)}px ${hsla(shadow_h, clamp(shadow_s + 28, 0, 100), clamp(light_far_l + 10, 0, 100), clamp(shadow_a * 0.18 * visibility_boost, 0, 1))}` ].join(', ');
                } else if (forcedShadow === 'studio_depth') {
                  shadow_css = [ `0 ${shadow_y_1}px ${Math.round(10 + 12 * ssz)}px ${dark_shadow_1}`, `0 ${shadow_y_2}px ${Math.round(18 + 20 * ssz)}px -${spread_2}px ${dark_shadow_2}`, `0 ${shadow_y_3}px ${Math.round(28 + 38 * ssz)}px -${spread_3}px ${dark_shadow_3}`, ...(subtle_rim === 'none' ? [] : [subtle_rim]) ].join(', ');
                } else if (forcedShadow === 'drop_shadow') {
                  shadow_css = [ `0 ${Math.round(10 + 22 * ssz)}px ${Math.round(18 + 30 * ssz)}px ${dark_shadow_2}`, ...(subtle_rim === 'none' ? [] : [`0 0 ${Math.round(6 + 14 * ssz)}px ${light_shadow_1}`]) ].join(', ');
                } else if (forcedShadow === 'soft_float') {
                  shadow_css = [ `0 ${Math.round(6 + 10 * ssz)}px ${Math.round(12 + 14 * ssz)}px ${dark_shadow_1}`, `0 ${Math.round(14 + 18 * ssz)}px ${Math.round(20 + 30 * ssz)}px -${Math.round(2 + 4 * ssz)}px ${dark_shadow_2}`, ...(subtle_rim === 'none' ? [] : [subtle_rim]) ].join(', ');
                } else if (forcedShadow === 'cinematic_depth') {
                  shadow_css = [ `0 ${Math.round(18 + 20 * ssz)}px ${Math.round(22 + 22 * ssz)}px -${Math.round(2 + 4 * ssz)}px ${dark_shadow_2}`, `0 ${Math.round(36 + 30 * ssz)}px ${Math.round(48 + 42 * ssz)}px -${Math.round(10 + 12 * ssz)}px ${dark_shadow_3}`, ...(subtle_rim === 'none' ? [] : [`0 0 ${Math.round(10 + 18 * ssz)}px ${light_shadow_2}`]) ].join(', ');
                }

                return { shadow_css };
              };

              return buildFx(variables.ts_type).shadow_css;
            ]]]
      name:
        - color: var(--primary-text-color)
        - font-size: 12px
        - font-weight: 700
