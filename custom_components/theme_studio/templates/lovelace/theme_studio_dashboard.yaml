                display: flex;
                justify-content: center;
                width: 100%;
              }
              ha-card {
                min-height: 0 !important;
                background: transparent !important;
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
              }
          card:
            type: vertical-stack
            cards:
              - type: custom:button-card
                name: Theme Studio theme not active
                icon: mdi:palette-alert
                show_state: false
                show_label: true
                label: >-
                  Open your user profile and select “Theme Studio Dynamic” as
                  the active theme before editing.
                tap_action:
                  action: navigate
                  navigation_path: /profile
                styles:
                  card:
                    - display: |
                        [[[
                          return (
                            getComputedStyle(document.documentElement)
                              .getPropertyValue('--theme-studio-signature')
                              .trim() === 'theme-studio-dynamic'
                          ) ? 'none' : 'block';
                        ]]]
                    - background: |
                        [[[
                          return (
                            getComputedStyle(document.documentElement)
                              .getPropertyValue('--theme-studio-signature')
                              .trim() === 'theme-studio-dynamic'
                          )
                            ? 'transparent'
                            : 'color-mix(in srgb, var(--primary-color) 50%, transparent)';
                        ]]]
                    - box-shadow: none
                    - border: none
                    - border-radius: var(--ha-card-border-radius)
                    - padding: |
                        [[[
                          return (
                            getComputedStyle(document.documentElement)
                              .getPropertyValue('--theme-studio-signature')
                              .trim() === 'theme-studio-dynamic'
                          ) ? '0' : '2px 0';
                        ]]]
                    - margin-right: 10px
                    - margin-left: 10px
                    - min-height: 0
                    - height: |
                        [[[
                          return (
                            getComputedStyle(document.documentElement)
                              .getPropertyValue('--theme-studio-signature')
                              .trim() === 'theme-studio-dynamic'
                          ) ? '0' : 'auto';
                        ]]]
