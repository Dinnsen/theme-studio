              # Theme Studio Guide


              Follow this order for best results:


              1. Select a **Built-in Preset** from the dropdown.

              2. Enter a theme name.

              3. Click **Save as New** to create a user theme.

              4. Adjust the theme to your liking.

              5. Click **Save** to store the current **Preset Mode**.

              6. Switch **Preset Mode** (Light/Dark), adjust, and save again.

              7. Click **Build Theme** — themes are saved in the **Home
              Assistant themes folder**.


              ⚠️ Always **Save** before switching **Preset Mode**.


              Built-in presets cannot be overwritten.
