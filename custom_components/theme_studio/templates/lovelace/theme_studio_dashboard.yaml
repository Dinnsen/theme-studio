                            const g = parseFloat(rgb[2]);
                            const b = parseFloat(rgb[3]);
                            const lum = 0.2126*r + 0.7152*g + 0.0722*b;
                            return lum > 150 ? 'rgba(17,17,17,0.74)' : 'rgba(255,255,255,0.74)';
                          }

