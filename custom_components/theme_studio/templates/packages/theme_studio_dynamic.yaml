    sequence:
    - variables:
        raw: '{{ (hex_color | default(''#344334'', true) | string).strip() }}'
        cleaned: '{{ raw | replace(''#'', '''') | lower }}'
        valid: '{{ cleaned | length == 6 }}'
        r_hex: '{{ cleaned[0:2] if valid else ''34'' }}'
        g_hex: '{{ cleaned[2:4] if valid else ''43'' }}'
        b_hex: '{{ cleaned[4:6] if valid else ''34'' }}'
        r_val: '{{ r_hex | int(0, 16) }}'
        g_val: '{{ g_hex | int(0, 16) }}'
        b_val: '{{ b_hex | int(0, 16) }}'
    - service: input_number.set_value
