            option: None
      - conditions:
        - condition: template
          value_template: '{{ current_preset in preset_opts and current_preset != ''None'' }}'
        sequence:
        - service: input_select.select_option
          target:
            entity_id: input_select.theme_studio_theme_presets
          data:
            option: '{{ current_preset }}'
