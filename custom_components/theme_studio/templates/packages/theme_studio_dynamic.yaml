        - service: input_text.set_value
          target:
            entity_id: input_text.theme_studio_selected_user_theme
          data:
            value: '{{ current_name }}'
  theme_studio_toggle_loaded_variant:
    alias: Theme Studio Toggle Loaded Variant
    sequence:
    - choose:
