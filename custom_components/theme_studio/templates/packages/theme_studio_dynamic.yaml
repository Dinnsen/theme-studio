  theme_studio_theme_reset_defaults:
    alias: theme_studio theme - reset defaults
    mode: restart
    sequence:
    - variables:
        current_preset: '{% set v = states(''input_select.theme_studio_theme_presets'') %} {% if v in [''unknown'', ''unavailable'', '''', none] %}None{% else %}{{ v | string | trim }}{% endif %}'
        current_user: '{% set v = states(''input_select.theme_studio_user_themes'') %} {% if v in [''unknown'', ''unavailable'', '''', none] %}None{% else %}{{ v | string | trim }}{% endif %}'
        current_variant: '{% set v = states(''input_text.theme_studio_loaded_variant'') %} {% if v in [''Light'', ''Dark''] %}{{ v }}{% else %}Dark{% endif %}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ current_user != ''None'' }}'
        sequence:
        - service: input_select.select_option
          target:
            entity_id: input_select.theme_studio_theme_presets
          data:
            option: Default
        - service: input_select.select_option
          target:
            entity_id: input_select.theme_studio_user_themes
          data:
            option: None
        - service: input_text.set_value
          target:
            entity_id: input_text.theme_studio_selected_user_theme
          data:
            value: None
      - conditions:
        - condition: template
          value_template: '{{ current_preset not in [''None'', ''unknown'', ''unavailable'', ''''] }}'
        sequence:
        - service: input_select.select_option
          target:
            entity_id: input_select.theme_studio_user_themes
          data:
            option: None
        - service: input_text.set_value
          target:
            entity_id: input_text.theme_studio_selected_user_theme
          data:
            value: None
      default:
      - service: input_select.select_option
        target:
          entity_id: input_select.theme_studio_theme_presets
        data:
          option: Default
      - service: input_select.select_option
        target:
          entity_id: input_select.theme_studio_user_themes
        data:
          option: None
      - service: input_text.set_value
        target:
          entity_id: input_text.theme_studio_selected_user_theme
        data:
          value: None
    - service: homeassistant.update_entity
      target:
        entity_id: sensor.theme_studio_selected_preset
    - delay: 00:00:01
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ current_variant == ''Light'' }}'
        sequence:
        - service: input_text.set_value
          target:
            entity_id: input_text.theme_studio_loaded_variant
          data:
            value: Light
        - service: input_button.press
          target:
            entity_id: input_button.theme_studio_theme_load_light_theme
      default:
      - service: input_text.set_value
        target:
          entity_id: input_text.theme_studio_loaded_variant
        data:
          value: Dark
      - service: input_button.press
        target:
          entity_id: input_button.theme_studio_theme_load_dark_theme
  theme_studio_sync_background_image_options:
    alias: Theme Studio - sync background image options
    sequence:
    - variables:
        raw: '{{ state_attr(''sensor.theme_studio_background_image_index'',''options'') | default([], true) | list }}'
        default_value: CloudWhite.png
        current_value: "{% set v = states('input_select.theme_studio_theme_background_image_select') %} {% if v in ['unknown', 'unavailable', '', none] %}\n  {{ default_value }}\n{% else %}\n  {{ v | string | trim }}\n{% endif %}"
        bg_opts: "{% set ns = namespace(items=[]) %} {% for item in raw %}\n  {% set name = (item | string | trim) %}\n  {% if name not in ['', 'unknown', 'unavailable'] and name not in ns.items %}\n    {% set ns.items = ns.items + [name] %}\n  {% endif %}\n{% endfor %} {{ ([default_value] + ns.items) | unique | list }}"
    - service: input_select.set_options
      target:
        entity_id: input_select.theme_studio_theme_background_image_select
      data:
        options: '{{ bg_opts }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ current_value in bg_opts }}'
        sequence:
        - service: input_select.select_option
          target:
            entity_id: input_select.theme_studio_theme_background_image_select
          data:
            option: '{{ current_value }}'
      default:
      - service: input_select.select_option
        target:
          entity_id: input_select.theme_studio_theme_background_image_select
        data:
          option: '{{ default_value }}'
    - service: input_text.set_value
      target:
        entity_id: input_text.theme_studio_theme_background_image_url
      data:
        value: /local/background/{{ states('input_select.theme_studio_theme_background_image_select') }}
  theme_studio_sync_preset_options:
