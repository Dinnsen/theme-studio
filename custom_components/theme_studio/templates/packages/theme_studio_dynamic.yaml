        data:
          option: Default
  theme_studio_sync_user_theme_options:
    alias: Theme Studio - sync user theme options
    sequence:
    - variables:
        raw: '{{ state_attr(''sensor.theme_studio_user_theme_index'',''options'') | default([], true) | list }}'
        raw_names: "{% set ns = namespace(items=[]) %} {% for item in raw %}\n  {% set name = (item | string).strip() %}\n  {% if name not in ['', 'None', 'unknown', 'unavailable'] and name not in ns.items %}\n    {% set ns.items = ns.items + [name] %}\n  {% endif %}\n{% endfor %} {{ ns.items }}"
        current_user: '{% set v = states(''input_select.theme_studio_user_themes'') %} {% if v in [''unknown'', ''unavailable'', '''', none] %}None{% else %}{{ v | string | trim }}{% endif %}'
        selected_user: '{% set v = states(''input_text.theme_studio_selected_user_theme'') %} {% if v in [''unknown'', ''unavailable'', '''', none] %}None{% else %}{{ v | string | trim }}{% endif %}'
        user_opts: '{{ [''None''] + raw_names }}'
    - service: input_select.set_options
      target:
        entity_id: input_select.theme_studio_user_themes
      data:
        options: '{{ user_opts }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ current_user != ''None'' and current_user in raw_names }}'
        sequence:
        - service: input_select.select_option
          target:
            entity_id: input_select.theme_studio_user_themes
          data:
            option: '{{ current_user }}'
        - service: input_text.set_value
          target:
            entity_id: input_text.theme_studio_selected_user_theme
          data:
            value: '{{ current_user }}'
      - conditions:
        - condition: template
          value_template: '{{ selected_user != ''None'' and selected_user in raw_names }}'
        sequence:
        - service: input_select.select_option
          target:
            entity_id: input_select.theme_studio_user_themes
          data:
            option: '{{ selected_user }}'
        - service: input_text.set_value
          target:
            entity_id: input_text.theme_studio_selected_user_theme
          data:
            value: '{{ selected_user }}'
      default:
      - service: input_select.select_option
        target:
          entity_id: input_select.theme_studio_user_themes
        data:
          option: None
      - service: input_text.set_value
        target:
          entity_id: input_text.theme_studio_selected_user_theme
        data:
          value: None
  theme_studio_select_current_name:
