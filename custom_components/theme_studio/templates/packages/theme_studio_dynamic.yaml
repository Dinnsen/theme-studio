        - None
        - Default
        - Glass
        - MD3
        - Dark Blue
        - Flavors
        - Vision
        - Dark Green
        - Purple
        - Pink Mono
        - Black White
        - Aurora
        current_preset: '{% set v = states(''input_select.theme_studio_theme_presets'') %} {% if v in [''unknown'', ''unavailable'', '''', none] %}Default{% else %}{{ v | string | trim }}{% endif %}'
        current_user_theme: '{% set v = states(''input_select.theme_studio_user_themes'') %} {% if v in [''unknown'', ''unavailable'', '''', none] %}None{% else %}{{ v | string | trim }}{% endif %}'
    - service: input_select.set_options
