template:
- sensor:
  - name: theme_studio theme summary
    state: '{{ states(''input_text.theme_studio_theme_base_color'') }} · overlay {{ states(''input_select.theme_studio_theme_background_overlay'') }} · o{{ states(''input_number.theme_studio_theme_overlay_contrast'') }} · bg{{ states(''input_number.theme_studio_theme_background_contrast'') }}'
    attributes:
      background: '{{ states(''input_text.theme_studio_theme_custom_background_color'') if is_state(''input_boolean.theme_studio_theme_use_custom_background_color'',''on'') else ''auto'' }}'
      image: '{{ states(''input_select.theme_studio_theme_background_image_select'') if is_state(''input_boolean.theme_studio_theme_use_background_image'',''on'') else ''none'' }}'
      text_override: '{{ states(''input_text.theme_studio_theme_custom_text_color'') if is_state(''input_boolean.theme_studio_theme_use_custom_text_color'',''on'') else ''off'' }}'
      icon_override: '{{ states(''input_text.theme_studio_theme_custom_icon_color'') if is_state(''input_boolean.theme_studio_theme_use_custom_icon_color'',''on'') else ''off'' }}'
      nav_override: '{{ states(''input_text.theme_studio_theme_custom_navbar_icon_color'') if is_state(''input_boolean.theme_studio_theme_use_custom_navbar_icon_color'',''on'') else ''off'' }}'
      accent_override: '{{ states(''input_text.theme_studio_theme_accent_color_override'') }}'
      card_override: '{{ states(''input_text.theme_studio_theme_card_bg_override'') }}'
      bubble_override: '{{ states(''input_text.theme_studio_theme_bubble_bg_override'') }}'
      popup_override: '{{ states(''input_text.theme_studio_theme_popup_bg_override'') }}'
  - name: theme_studio picker hex
    state: '{% set r = states(''input_number.theme_studio_picker_red'') | int(0) %} {% set g = states(''input_number.theme_studio_picker_green'') | int(0) %} {% set b = states(''input_number.theme_studio_picker_blue'') | int(0) %} {{ ''#%02X%02X%02X'' | format(r, g, b) }}'
script:
  theme_studio_picker_apply_base_color:
    alias: theme_studio picker - apply base color
    sequence:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.theme_studio_theme_use_custom_background_color
    - service: input_text.set_value
      target:
        entity_id: input_text.theme_studio_theme_base_color
      data:
        value: '{{ states(''sensor.theme_studio_picker_hex'') }}'
  theme_studio_picker_apply_custom_bg_color:
    alias: theme_studio Picker Apply Custom BG Color
    sequence:
    - service: input_text.set_value
      target:
        entity_id: input_text.theme_studio_theme_custom_background_color
      data:
