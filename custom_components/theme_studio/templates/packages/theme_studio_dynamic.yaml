- id: theme_studio_load_dark
  alias: Theme Studio - load dark theme
  trigger:
  - platform: state
    entity_id: input_button.theme_studio_theme_load_dark_theme
  action:
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.theme_studio_busy
  - service: input_text.set_value
    target:
      entity_id: input_text.theme_studio_busy_message
    data:
      value: Loading Dark
  - service: input_text.set_value
    target:
      entity_id: input_text.theme_studio_loaded_variant
    data:
      value: Dark
  - service: homeassistant.update_entity
    target:
      entity_id: sensor.theme_studio_selected_preset
  - delay: 00:00:01
  - variables:
      dark_data: '{{ state_attr(''sensor.theme_studio_selected_preset'',''dark'') or {} }}'
      dark_bg_image: '{{ (state_attr(''sensor.theme_studio_selected_preset'',''dark'') or {}).get(''background_image_url'') if (state_attr(''sensor.theme_studio_selected_preset'',''dark'') or {}).get(''background_image_url'') is not none else states(''input_select.theme_studio_theme_background_image_select'') }}'
