- id: theme_studio_load_light
  alias: Theme Studio - load light theme
  trigger:
  - platform: state
    entity_id: input_button.theme_studio_theme_load_light_theme
  action:
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.theme_studio_busy
  - service: input_text.set_value
    target:
      entity_id: input_text.theme_studio_busy_message
    data:
      value: Loading Light
  - service: input_text.set_value
    target:
      entity_id: input_text.theme_studio_loaded_variant
    data:
      value: Light
  - service: homeassistant.update_entity
    target:
      entity_id: sensor.theme_studio_selected_preset
  - delay: 00:00:01
  - variables:
      light_data: '{{ state_attr(''sensor.theme_studio_selected_preset'',''light'') or {} }}'
      light_bg_image: '{{ (state_attr(''sensor.theme_studio_selected_preset'',''light'') or {}).get(''background_image_url'') if (state_attr(''sensor.theme_studio_selected_preset'',''light'') or {}).get(''background_image_url'') is not none else states(''input_select.theme_studio_theme_background_image_select'') }}'
      bg_options: '{{ state_attr(''sensor.theme_studio_background_image_index'',''options'') | default([], true) | list }}'
  - service: input_text.set_value
    target:
      entity_id: input_text.theme_studio_theme_name
    data:
      value: '{{ state_attr(''sensor.theme_studio_selected_preset'',''name'') if state_attr(''sensor.theme_studio_selected_preset'',''name'') else (states(''input_select.theme_studio_theme_presets'') if states(''input_select.theme_studio_theme_presets'') not in [''unknown'',''unavailable'','''',''None''] else ''Default'') }}'
  - service: input_text.set_value
    target:
      entity_id: input_text.theme_studio_theme_base_color
    data:
      value: '{{ light_data.get(''base_color'') if light_data.get(''base_color'') is not none else states(''input_text.theme_studio_theme_base_color'') }}'
  - service: input_text.set_value
    target:
      entity_id: input_text.theme_studio_theme_custom_background_color
    data:
      value: '{{ light_data.get(''custom_background_color'') if light_data.get(''custom_background_color'') is not none else states(''input_text.theme_studio_theme_custom_background_color'') }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ light_bg_image in bg_options }}'
      sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.theme_studio_theme_background_image_select
        data:
          option: '{{ light_bg_image }}'
  - service: input_text.set_value
