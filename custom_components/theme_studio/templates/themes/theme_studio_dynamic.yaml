  card-mod-theme: "Theme Studio Dynamic"
  theme-studio-signature: "theme-studio-dynamic"
  card-mod-root-yaml: |
    
    ha-card:not(.theme-studio-no-fx) {
      border-radius: 28px !important;
      --ha-card-border-radius: 28px !important;
      overflow: hidden;
      border: var(--theme-studio-card-border-css, none) !important;
      box-shadow: var(--theme-studio-card-shadow-css, none) !important;
    }
    
    ha-card.theme-studio-no-fx {
      border: none !important;
      box-shadow: none !important;
    }
    
    button-card,
    .button-card-main,
    button-card > * {
      border-radius: 22px !important;
    }
    @media only screen and (max-width: 768px) {
      .header {
        display: none;
        opacity: 0;
      }
    
      #view {
        padding-top: 0 !important;
        margin-top: 0 !important;
        min-height: calc(100vh - env(safe-area-inset-top)) !important;
      }
    }
    
    #root {
      --masonry-view-card-margin: 0px 0px 0px;
    }
    
    #root > hui-card[hidden],
    #root > hui-vertical-stack-card[hidden] {
      margin: 0 !important;
    }
    
    home-assistant,
    home-assistant-main,
    ha-app-layout,
    app-drawer-layout,
    partial-panel-resolver,
    ha-panel-lovelace,
    hui-root,
    hui-view,
    grid-layout,
    .view,
    #root,
    hui-card {
      --lovelace-background: transparent !important;
      background: transparent !important;
      background-color: transparent !important;
    }
    
    .background {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      background-position: center top !important;
      background-size: cover !important;
      background-repeat: no-repeat !important;
      pointer-events: none !important;
      z-index: 0 !important;
    }
    
    #view {
      --lovelace-background: transparent !important;
      position: relative;
      min-height: 100vh !important;
      min-height: 100dvh !important;
      background: transparent !important;
      background-color: transparent !important;
      z-index: 1 !important;
    }
  card-mod-more-info-yaml: |
    $: |
      .mdc-dialog .mdc-dialog__scrim,
      ha-dialog .mdc-dialog__scrim,
      md-dialog::part(scrim) {
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        background: rgba(0,0,0,.6);
      }
      .mdc-dialog .mdc-dialog__container .mdc-dialog__surface,
      ha-dialog .mdc-dialog__surface,
      md-dialog {
        box-shadow: none !important;
        border-radius: var(--ha-card-border-radius);
        background: var(--ha-card-background) !important;
        color: var(--primary-text-color) !important;
        --mdc-theme-surface: var(--ha-card-background);
        --mdc-theme-on-surface: var(--primary-text-color);
        --mdc-dialog-content-ink-color: var(--primary-text-color);
        --mdc-dialog-heading-ink-color: var(--primary-text-color);
        --mdc-text-button-label-text-color: var(--accent-color);
        --md-sys-color-surface: var(--ha-card-background);
        --md-sys-color-on-surface: var(--primary-text-color);
        --md-sys-color-primary: var(--accent-color);
      }
      .mdc-dialog__title,
      .mdc-dialog__content,
      .mdc-dialog__button,
      .mdc-button,
      .mdc-button__label,
      ha-dialog *,
      md-dialog * {
        color: var(--primary-text-color) !important;
      }
    .: |
      :host {
        --ha-card-box-shadow: none;
      }
  card-mod-view-yaml: |
    hui-sidebar-view:
      $: |
        @media only screen and (min-width: 768px) {
            .container {
              max-width: 520px;
              margin: auto !important;
              width: -webkit-fill-available;
            }
        }
        #wrapper: |
          $: |
            #progressContainer {
                border-radius: 14px !important;
        }
      .: |
        "#view>hui-view>hui-sidebar-view$#main>hui-card-options:nth-child(7)>vertical-stack-in-card$ha-card>div>hui-horizontal-stack-card$#root>hui-grid-card$#root>hui-entities-card$#states>div:nth-child(4)>slider-entity-row$div>ha-slider$#sliderBar$#progressContainer" {
            border-radius: 14px !important;
        }
  card-mod-card: |
    ha-card {
      transition: none;
      border-style: none !important
    }
